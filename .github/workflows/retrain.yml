name: Retrain

on:
  workflow_dispatch:
  # schedule:
  #   # Runs daily at midnight UTC
  #   - cron: "0 0 * * *"

jobs:
  retrain:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MODEL_NAME: fraudshield-xgboost

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Download IEEE-CIS dataset
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          pip install kaggle
          kaggle competitions download -c ieee-fraud-detection
          unzip -o ieee-fraud-detection.zip -d data/raw/

      - name: Generate drifted inference batch
        run: python scripts/generate_inference_batch.py

      - name: Run drift detection and conditional retraining
        run: python scripts/check_drift.py

