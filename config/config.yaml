api:
  fraud_threshold: 0.5
  recent_transactions_limit: 100
  suspicious_threshold: 0.3
data:
  join_key: TransactionID
  max_training_rows: 20000
  required_test_transaction_columns:
  - TransactionID
  - TransactionDT
  - TransactionAmt
  - ProductCD
  - card1
  - card2
  - card3
  - card4
  - card5
  - card6
  required_train_transaction_columns:
  - TransactionID
  - isFraud
  - TransactionDT
  - TransactionAmt
  - ProductCD
  - card1
  - card2
  - card3
  - card4
  - card5
  - card6
  target_column: isFraud
  test_identity_file: test_identity.csv
  test_transaction_file: test_transaction.csv
  train_identity_file: train_identity.csv
  train_transaction_file: train_transaction.csv
drift_simulation:
  base_intensity: 0.1
  current_intensity: 0.1
  drift_threshold: 0.05
  intensity_increment: 0.2
  max_intensity: 1.0
features:
  categorical_columns:
  - ProductCD
  - card4
  - card6
  - P_emaildomain
  - R_emaildomain
  - DeviceType
  merchant_key_columns:
  - ProductCD
  - card4
  - P_emaildomain
  rolling_windows:
    merchant_days: 30
    user_days: 30
    velocity_hours: 1
  user_key_columns:
  - card1
  - card2
  - card3
  - card5
  - addr1
model:
  name: fraudshield-xgboost
  threshold_search:
    max: 0.7
    min: 0.3
    step: 0.05
  xgboost:
    colsample_bytree: 0.8
    eval_metric: aucpr
    learning_rate: 0.05
    max_depth: 6
    n_estimators: 300
    objective: binary:logistic
    subsample: 0.8
paths:
  inference_batch_dir: data/inference_batches
  logs_dir: logs
  models_dir: models
  processed_data_dir: data/processed
  raw_data_dir: data/raw
  reports_dir: reports
project:
  name: fraudshield
  random_state: 42
retraining:
  max_retrains_per_day: 3
  min_hours_between_retrains: 6
  promotion_min_f1_delta: 0.01
  tune_hyperparameters: false
split:
  smote_sampling_strategy: 0.3
  stratify: true
  test_size: 0.15
  train_size: 0.7
  use_smote: true
  validation_size: 0.15
